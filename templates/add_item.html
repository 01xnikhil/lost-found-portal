{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container mt-5 d-flex justify-content-center">
    <div class="add-item-card d-flex align-items-center p-4" style="background: rgba(255,255,255,0.05); border-radius: 15px; max-width: 900px; width: 100%;">
      
      <!-- Avatar SVG on the left -->
      <div class="avatar-svg me-4" style="flex-shrink:0;">
        <svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 64 64">
          <!-- Head -->
          <circle cx="32" cy="12" r="6" fill="#FFD700"/>
          <!-- Body -->
          <rect x="28" y="18" width="8" height="20" fill="#FF8C00"/>
          <!-- Legs -->
          <rect x="28" y="38" width="3" height="12" fill="#8B4513">
            <animateTransform attributeName="transform" type="translate" values="0 0;0 2;0 0" dur="0.6s" repeatCount="indefinite"/>
          </rect>
          <rect x="33" y="38" width="3" height="12" fill="#8B4513">
            <animateTransform attributeName="transform" type="translate" values="0 0;0 -2;0 0" dur="0.6s" repeatCount="indefinite"/>
          </rect>
          <!-- Arms waving -->
          <rect x="24" y="18" width="4" height="12" fill="#FFD700" transform="rotate(20 24 18)">
            <animateTransform attributeName="transform" type="rotate" values="20 24 18;-20 24 18;20 24 18" dur="0.8s" repeatCount="indefinite"/>
          </rect>
          <rect x="36" y="18" width="4" height="12" fill="#FFD700" transform="rotate(-20 36 18)">
            <animateTransform attributeName="transform" type="rotate" values="-20 36 18;20 36 18;-20 36 18" dur="0.8s" repeatCount="indefinite"/>
          </rect>
          <!-- Bag bouncing -->
          <rect x="38" y="26" width="8" height="8" rx="2" ry="2" fill="#FF4500">
            <animateTransform attributeName="transform" type="translate" values="0 0;0 -5;0 0" dur="0.8s" repeatCount="indefinite"/>
          </rect>
          <!-- Fun little smile -->
          <path d="M28 12 Q32 16 36 12" stroke="#000" stroke-width="1.5" fill="transparent">
            <animateTransform attributeName="transform" type="scale" values="1;1.1;1" dur="1s" repeatCount="indefinite" additive="sum"/>
          </path>
        </svg>
      </div>

      <!-- Form on the right -->
      <form method="POST" enctype="multipart/form-data" class="animated-form flex-grow-1">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="mb-2">
    <label for="id_category">Category</label>
    <select name="category" id="id_category" class="form-select" style="color:grey;">
        <option value="electronics">Electronics</option>
        <option value="clothes">Clothes</option>
        <option value="stationary">Stationary</option>
        <option value="others">Others</option>
    </select>
</div>
        <button type="submit" class="btn btn-primary mt-2 px-3 py-1">Submit</button>
      </form>

    </div>
</div>

<script>
// Animate form inputs with stagger
document.addEventListener('DOMContentLoaded', () => {
    const inputs = document.querySelectorAll('.animated-form input, .animated-form select, .animated-form textarea');
    inputs.forEach((input, i) => {
        input.style.opacity = 0;
        input.style.transform = 'translateY(20px)';
        setTimeout(() => {
            input.style.transition = 'all 0.4s ease';
            input.style.opacity = 1;
            input.style.transform = 'translateY(0)';
        }, i * 150); // stagger each input
    });
});
</script>
{% endblock %}
